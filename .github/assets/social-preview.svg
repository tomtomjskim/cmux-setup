<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
    <style>
      .mono { font-family: 'SF Mono', 'JetBrains Mono', 'Menlo', monospace; }
      .sans { font-family: 'SF Pro Display', 'Inter', -apple-system, sans-serif; }
      .title  { font-size: 96px; font-weight: 700; fill: #f0f6fc; letter-spacing: -2px; }
      .accent { fill: url(#accent); }
      .tag    { font-size: 30px; font-weight: 400; fill: #c9d1d9; }
      .cmd    { font-size: 34px; font-weight: 500; fill: #58a6ff; }
      .pane-bg{ fill: #0d1117; stroke: #30363d; stroke-width: 1.5; }
      .pane-h { fill: #161b22; stroke: #30363d; stroke-width: 1.5; }
      .label  { font-size: 14px; font-weight: 500; fill: #8b949e; }
      .layout-name { font-size: 16px; font-weight: 600; fill: #c9d1d9; }
      .pane-tag { font-size: 13px; fill: #58a6ff; }
      .footer { font-size: 20px; font-weight: 500; fill: #8b949e; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- top accent bar -->
  <rect x="0" y="0" width="1280" height="6" fill="url(#accent)"/>

  <!-- title -->
  <text x="80" y="135" class="sans title">cmux<tspan class="accent">-setup</tspan></text>

  <!-- tagline -->
  <text x="82" y="180" class="sans tag">macOS helper for cmux — spawn a workspace with one command</text>

  <!-- command pill -->
  <rect x="80" y="215" width="640" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="105" y="255" class="mono cmd">$ cmx ~/work/myapp 80</text>

  <!-- 3 layout previews -->
  <g transform="translate(80, 340)">

    <!-- LAYOUT 1: default (3-col) -->
    <g>
      <text x="0" y="-12" class="sans layout-name">--v-default</text>
      <!-- frame 360x180 -->
      <rect x="0" y="0" width="360" height="180" class="pane-bg" rx="6"/>
      <!-- left col: claude / codex -->
      <rect x="0" y="0" width="120" height="90" class="pane-h" rx="0"/>
      <text x="14" y="22" class="mono pane-tag">claude</text>
      <rect x="0" y="90" width="120" height="90" class="pane-h" rx="0"/>
      <text x="14" y="112" class="mono pane-tag">codex</text>
      <!-- middle col: t1/t2/t3 -->
      <rect x="120" y="0" width="120" height="60" class="pane-bg" rx="0"/>
      <text x="134" y="22" class="mono label">t1</text>
      <rect x="120" y="60" width="120" height="60" class="pane-bg" rx="0"/>
      <text x="134" y="82" class="mono label">t2</text>
      <rect x="120" y="120" width="120" height="60" class="pane-bg" rx="0"/>
      <text x="134" y="142" class="mono label">t3</text>
      <!-- right col: browser -->
      <rect x="240" y="0" width="120" height="180" class="pane-bg" rx="0"/>
      <text x="254" y="22" class="mono label">browser</text>
      <!-- divider lines -->
      <line x1="120" y1="0" x2="120" y2="180" stroke="#30363d" stroke-width="1.5"/>
      <line x1="240" y1="0" x2="240" y2="180" stroke="#30363d" stroke-width="1.5"/>
      <line x1="0" y1="90" x2="120" y2="90" stroke="#30363d" stroke-width="1.5"/>
      <line x1="120" y1="60" x2="240" y2="60" stroke="#30363d" stroke-width="1.5"/>
      <line x1="120" y1="120" x2="240" y2="120" stroke="#30363d" stroke-width="1.5"/>
    </g>

    <!-- LAYOUT 2: simple -->
    <g transform="translate(380, 0)">
      <text x="0" y="-12" class="sans layout-name">--v-simple</text>
      <rect x="0" y="0" width="360" height="180" class="pane-bg" rx="6"/>
      <rect x="0" y="0" width="180" height="180" class="pane-h" rx="0"/>
      <text x="14" y="22" class="mono pane-tag">shell</text>
      <text x="14" y="42" class="mono label">(DEV_CMD)</text>
      <rect x="180" y="0" width="180" height="180" class="pane-bg" rx="0"/>
      <text x="194" y="22" class="mono label">browser</text>
      <line x1="180" y1="0" x2="180" y2="180" stroke="#30363d" stroke-width="1.5"/>
    </g>

    <!-- LAYOUT 3: 4split -->
    <g transform="translate(760, 0)">
      <text x="0" y="-12" class="sans layout-name">--v-4split</text>
      <rect x="0" y="0" width="360" height="180" class="pane-bg" rx="6"/>
      <!-- left big: dev -->
      <rect x="0" y="0" width="180" height="120" class="pane-h" rx="0"/>
      <text x="14" y="22" class="mono pane-tag">dev</text>
      <!-- right top: test -->
      <rect x="180" y="0" width="180" height="60" class="pane-bg" rx="0"/>
      <text x="194" y="22" class="mono label">test</text>
      <!-- right bottom: claude -->
      <rect x="180" y="60" width="180" height="60" class="pane-h" rx="0"/>
      <text x="194" y="82" class="mono pane-tag">claude</text>
      <!-- bottom: browser -->
      <rect x="0" y="120" width="360" height="60" class="pane-bg" rx="0"/>
      <text x="14" y="142" class="mono label">browser</text>
      <line x1="180" y1="0" x2="180" y2="120" stroke="#30363d" stroke-width="1.5"/>
      <line x1="180" y1="60" x2="360" y2="60" stroke="#30363d" stroke-width="1.5"/>
      <line x1="0" y1="120" x2="360" y2="120" stroke="#30363d" stroke-width="1.5"/>
    </g>
  </g>

  <!-- footer -->
  <text x="80" y="595" class="sans footer">github.com/tomtomjskim/cmux-setup  ·  MIT</text>
  <text x="1200" y="595" class="sans footer" text-anchor="end">cmux.com</text>
</svg>
